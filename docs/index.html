<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>忙个明白</title>
    <meta
      name="description"
      content="忙个明白是一个轻量桌面工作记录工具，用来记录主线工作、打断截图和 24 小时时间轴。"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #06120f;
        --panel: rgba(9, 34, 29, 0.72);
        --line: rgba(184, 255, 232, 0.18);
        --text: #f4fff9;
        --muted: rgba(244, 255, 249, 0.72);
        --accent: #55d6aa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 58% 8%, rgba(84, 206, 168, 0.24), transparent 34%),
          linear-gradient(145deg, #020806, var(--bg) 55%, #020806);
        color: var(--text);
      }

      main {
        width: min(1120px, calc(100vw - 40px));
        margin: 0 auto;
        padding: 56px 0 44px;
      }

      .hero {
        display: grid;
        gap: 22px;
        margin-bottom: 28px;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 15px;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: clamp(44px, 7vw, 86px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .lead {
        max-width: 780px;
        margin: 0;
        color: var(--muted);
        font-size: clamp(18px, 2.4vw, 25px);
        line-height: 1.62;
      }

      .video-shell {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 26px;
        background: var(--panel);
        box-shadow: 0 26px 86px rgba(0, 0, 0, 0.38);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #020806;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 17px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        font-size: 15px;
        text-decoration: none;
      }

      .button.primary {
        border-color: rgba(85, 214, 170, 0.5);
        background: rgba(85, 214, 170, 0.16);
      }

      .notes {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 24px;
      }

      .note {
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.055);
      }

      .note strong {
        display: block;
        margin-bottom: 8px;
        font-size: 17px;
      }

      .note span {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 24px, 1120px);
          padding-top: 34px;
        }

        .notes {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">轻量桌面工作记录工具</div>
        <h1>忙个明白</h1>
        <p class="lead">
          记录主线工作、打断现场和时间轴。一天结束后，把“忙”摊开看清楚。
        </p>
      </section>

      <section class="video-shell" aria-label="忙个明白演示视频">
        <video
          controls
          preload="metadata"
          poster="assets/busy-clear-video-cover.jpg"
          src="assets/busy-clear-github-preview.mp4"
        >
          你的浏览器不支持视频播放。请前往 GitHub Release 下载演示视频。
        </video>
      </section>

      <div class="actions">
        <a class="button primary" href="https://github.com/czcyolo/busy-clear/releases/tag/v0.1.0-mac-alpha">
          下载 Mac Alpha
        </a>
        <a class="button" href="https://github.com/czcyolo/busy-clear">
          查看源码
        </a>
      </div>

      <section class="notes">
        <div class="note">
          <strong>主线</strong>
          <span>开始、停止和继续主任务，累积真正的工作时长。</span>
        </div>
        <div class="note">
          <strong>打断</strong>
          <span>被临时事项打断时截图，自动挂回当天时间线。</span>
        </div>
        <div class="note">
          <strong>复盘</strong>
          <span>导出 24 小时时间轴，看见工作和打断如何发生。</span>
        </div>
      </section>
    </main>
  </body>
</html>
